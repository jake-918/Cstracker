<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CS Tracker"/>
<meta name="theme-color" content="#0A0F14"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>CS Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── DESIGN TOKENS ── */
:root {
  --teal:        #0BC4B4;
  --teal-dark:   #089488;
  --teal-dim:    rgba(11,196,180,0.14);
  --teal-card:   #0E2F2C;
  --navy:        #0A0F14;
  --navy-2:      #111820;
  --navy-3:      #192130;
  --surface:     #141E28;
  --surface-2:   #1C2A38;
  --pink:        #F84982;
  --text-1:      #FFFFFF;
  --text-2:      #8FA8B8;
  --text-3:      #4A6070;
  --win:         #2ECC8A;
  --loss:        #F84982;
  --divider:     rgba(255,255,255,0.07);
  --radius:      20px;
  --radius-sm:   14px;
  --safe-top:    env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; overflow: hidden;
  background: var(--navy);
  font-family: 'DM Sans', sans-serif;
  color: var(--text-1);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeSpeed;
}

/* ── APP SHELL ── */
#app {
  display: flex; flex-direction: column;
  height: 100%; height: 100dvh;
  transform: translateZ(0);
}

/* ── SCREEN CONTAINER ── */
#screen-container {
  flex: 1; position: relative;
  overflow: hidden;
  contain: strict;
}

/* ── SCREENS — GPU translateX ── */
.screen {
  position: absolute; inset: 0;
  overflow-y: auto; overflow-x: hidden;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
  transform: translateX(100%) translateZ(0);
  will-change: transform;
  transition: transform 0.38s cubic-bezier(0.25,0.46,0.45,0.94);
  visibility: hidden;
  pointer-events: none;
}
.screen.active {
  transform: translateX(0) translateZ(0);
  visibility: visible;
  pointer-events: auto;
}
.screen.exit-left {
  transform: translateX(-28%) translateZ(0);
  visibility: hidden;
  pointer-events: none;
}
.screen-inner {
  padding: 0 18px 30px;
  position: relative; z-index: 1;
  min-height: 100%;
  contain: content;
}

/* ── NAV BAR ── */
#navbar {
  position: relative; z-index: 100;
  padding-top: var(--safe-top);
  background: rgba(10,15,20,0.92);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--divider);
  transform: translateZ(0);
  contain: layout style;
}
.nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; }
.nav-title {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 17px; letter-spacing: 2px; color: var(--teal);
  text-transform: uppercase;
  transition: opacity 0.15s ease;
}
.nav-title.changing { opacity: 0; }
.nav-btn {
  background: var(--teal-dim); border: none; color: var(--teal);
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; font-weight: 700;
  transform: scale(1) translateZ(0); will-change: transform;
  transition: transform 0.1s ease;
  font-family: inherit;
}
.nav-btn:active { transform: scale(0.88) translateZ(0); }
.nav-btn:disabled { opacity: 0.3; }

/* ── TAB BAR ── */
#tabbar {
  background: rgba(10,15,20,0.96);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--divider);
  padding-bottom: var(--safe-bottom);
  position: relative; z-index: 100;
  transform: translateZ(0);
  contain: layout style;
  transition: transform 0.32s cubic-bezier(0.25,0.46,0.45,0.94);
  will-change: transform;
}
#tabbar.hidden { transform: translateY(100%) translateZ(0); }
.tabs { display: flex; }
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 10px 0 5px; border: none; background: none;
  color: var(--text-3); cursor: pointer; font-family: inherit;
  transition: color 0.18s ease; transform: translateZ(0);
}
.tab svg { width: 22px; height: 22px; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1); }
.tab span { font-size: 9px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
.tab.active { color: var(--teal); }
.tab.active svg { transform: scale(1.18) translateZ(0); filter: drop-shadow(0 0 6px rgba(11,196,180,0.5)); }
.tab:active svg { transform: scale(0.9) translateZ(0); }

/* ── CARDS ── */
.card { background: var(--surface); border-radius: var(--radius); overflow: hidden; contain: content; }
.card-p { background: var(--surface); border-radius: var(--radius); padding: 18px; contain: content; }

/* ── TEAL HERO CARD (reference image style) ── */
.hero-card {
  background: linear-gradient(145deg, #0B3B38 0%, #0A2E2B 60%, #071E1C 100%);
  border-radius: 24px;
  border: 1px solid rgba(11,196,180,0.2);
  padding: 22px; margin-bottom: 18px;
  position: relative; overflow: hidden;
  contain: content; transform: translateZ(0);
}
.hero-card::before {
  content: ''; position: absolute;
  right: -40px; top: -40px;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(11,196,180,0.18) 0%, transparent 70%);
  pointer-events: none;
}

/* ── RATING DISPLAY ── */
.rating-num {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 58px; line-height: 1; color: var(--text-1);
  letter-spacing: -2px;
}
.rating-label {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  color: var(--teal); text-transform: uppercase; margin-top: 4px;
}

/* ── PILL BUTTON (from reference) ── */
.btn-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--text-1); color: var(--navy);
  border: none; border-radius: 40px;
  padding: 12px 24px; font-family: inherit;
  font-size: 14px; font-weight: 700; cursor: pointer;
  transform: translateZ(0); will-change: transform;
  transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
}
.btn-pill:active { transform: scale(0.95) translateZ(0); }
.btn-pill.teal { background: var(--teal); color: var(--navy); }
.btn-pill.outline { background: transparent; color: var(--text-1); border: 1.5px solid rgba(255,255,255,0.3); }
.btn-pill:disabled { opacity: 0.4; }
.btn-full { width: 100%; justify-content: center; }

/* ── STAT GRID ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-cell {
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 15px; display: flex; flex-direction: column;
  gap: 0; contain: content;
  border: 1px solid var(--divider);
  transform: translateZ(0);
  transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
}
.stat-cell:active { transform: scale(0.97) translateZ(0); }
.stat-cell-icon { font-size: 18px; margin-bottom: 10px; }
.stat-cell-val {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: 24px; line-height: 1; color: var(--text-1);
}
.stat-cell-lbl {
  font-size: 10px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.8px; margin-top: 5px;
}
.stat-cell-sub { font-size: 10px; color: var(--teal); margin-top: 3px; font-weight: 600; }
.val-win  { color: var(--win)  !important; }
.val-loss { color: var(--loss) !important; }
.val-teal { color: var(--teal) !important; }

/* ── SECTION HEADER ── */
.section-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 17px; color: var(--text-1); }
.section-link { font-size: 12px; font-weight: 600; color: var(--teal); background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 3px; font-family: inherit; }

/* ── MATCH CARD (reference: teal card with bold title) ── */
.match-card {
  background: var(--surface); border-radius: var(--radius);
  margin-bottom: 10px; overflow: hidden; contain: content;
  border: 1px solid var(--divider);
  cursor: pointer; transform: translateZ(0);
  transition: transform 0.12s ease;
  display: flex; align-items: stretch;
}
.match-card:active { transform: scale(0.97) translateZ(0); }
.match-card-accent {
  width: 5px; flex-shrink: 0;
  background: linear-gradient(180deg, var(--teal) 0%, var(--teal-dark) 100%);
}
.match-card-accent.loss { background: linear-gradient(180deg, var(--loss) 0%, #b03060 100%); }
.match-card-body { flex: 1; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.match-card-icon { width: 42px; height: 42px; border-radius: 10px; background: var(--teal-dim); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.match-card-icon.loss { background: rgba(248,73,130,0.12); }
.match-card-info { flex: 1; min-width: 0; }
.match-map { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--text-1); }
.match-sub { font-size: 11px; color: var(--text-2); margin-top: 2px; }
.match-card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.match-score { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--teal); }
.match-score.loss { color: var(--loss); }
.result-badge { font-size: 9px; font-weight: 700; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
.result-badge.win  { background: rgba(46,204,138,0.15); color: var(--win); }
.result-badge.loss { background: rgba(248,73,130,0.15); color: var(--loss); }

/* ── FORM DOTS ── */
.form-row { display: flex; gap: 4px; }
.form-dot { width: 20px; height: 8px; border-radius: 4px; }
.form-dot.w { background: var(--win); }
.form-dot.l { background: var(--loss); }

/* ── SCOREBOARD ── */
.sb-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; border: 1px solid var(--divider); contain: content; }
.sb-team-hdr { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; background: var(--surface-2); }
.sb-team-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--text-1); }
.sb-score { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: var(--teal); }
.sb-score.loss { color: var(--loss); }
.sb-cols { display: grid; grid-template-columns: 1fr 28px 28px 28px 38px 38px; padding: 6px 16px; border-bottom: 1px solid var(--divider); }
.sb-col-hdr { font-size: 9px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
.sb-col-hdr:first-child { text-align: left; }
.sb-player { display: grid; grid-template-columns: 1fr 28px 28px 28px 38px 38px; padding: 9px 16px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.04); }
.sb-player:last-child { border-bottom: none; }
.sb-player.me { background: rgba(11,196,180,0.07); border-left: 3px solid var(--teal); }
.sb-player-name { font-size: 13px; font-weight: 500; color: var(--text-1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-player.me .sb-player-name { color: var(--teal); font-weight: 700; }
.sb-stat { font-size: 12px; color: var(--text-1); text-align: center; font-variant-numeric: tabular-nums; }

/* ── RANKINGS ── */
.rank-hero {
  background: linear-gradient(145deg, #0B3B38 0%, #071E1C 100%);
  border: 1px solid rgba(11,196,180,0.25); border-radius: 22px;
  padding: 20px; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
  contain: content; transform: translateZ(0);
}
.rank-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 52px; color: var(--teal); line-height: 1; }
.rank-row {
  display: flex; align-items: center; gap: 11px; padding: 11px 14px;
  background: var(--surface); border-radius: var(--radius-sm);
  margin-bottom: 8px; contain: content; border: 1px solid var(--divider);
  transform: translateZ(0); transition: transform 0.12s ease;
}
.rank-row:active { transform: scale(0.97) translateZ(0); }
.rank-row.me { background: var(--teal-dim); border-color: rgba(11,196,180,0.35); }
.rank-pos { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px; width: 32px; flex-shrink: 0; }
.rank-pos.g { color: #FFD700; }
.rank-pos.s { color: #C0C0C0; }
.rank-pos.b { color: #CD7F32; }
.rank-pos.n { color: var(--text-3); }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 14px; font-weight: 600; color: var(--text-1); }
.rank-name.me { color: var(--teal); font-weight: 700; }
.rank-country { font-size: 10px; color: var(--text-3); letter-spacing: 0.5px; text-transform: uppercase; }
.rank-rating { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: var(--text-1); }
.rank-rating.me { color: var(--teal); }

/* ── NOTES ── */
.note-card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; border: 1px solid var(--divider); contain: content; }
.note-tag { display: inline-flex; align-items: center; gap: 5px; background: var(--teal-dim); color: var(--teal); font-size: 9px; font-weight: 700; letter-spacing: 0.5px; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }
.note-body { font-size: 14px; line-height: 1.6; color: var(--text-1); margin: 10px 0; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
.note-date { font-size: 10px; color: var(--text-3); }
.note-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--divider); }
.btn-sm {
  padding: 7px 16px; border-radius: 20px; border: none;
  font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
  transform: translateZ(0); transition: transform 0.1s cubic-bezier(0.34,1.56,0.64,1);
}
.btn-sm:active { transform: scale(0.9) translateZ(0); }
.btn-edit { background: var(--teal-dim); color: var(--teal); }
.btn-del  { background: rgba(248,73,130,0.12); color: var(--loss); }

/* ── SETTINGS ── */
.settings-group { margin-bottom: 20px; }
.settings-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; padding-left: 4px; }
.settings-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--divider); contain: content; }
.settings-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--divider); }
.settings-row:last-child { border-bottom: none; }
.settings-row-icon { width: 30px; height: 30px; border-radius: 9px; background: var(--teal-dim); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.settings-row-lbl { font-size: 14px; font-weight: 600; color: var(--text-1); flex: 1; }
.settings-input { background: none; border: none; color: var(--text-1); font-family: inherit; font-size: 14px; text-align: right; flex: 1; outline: none; min-width: 0; }
.settings-input::placeholder { color: var(--text-3); }
select.settings-input option { background: var(--surface-2); }

/* ── AVATAR ── */
.avatar { border-radius: 50%; background: var(--surface-2); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; border: 2px solid rgba(11,196,180,0.35); }
.avatar img { width: 100%; height: 100%; object-fit: cover; }

/* ── SHEET ── */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0);
  z-index: 200; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease, background 0.25s ease;
  backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
}
.sheet-overlay.open {
  opacity: 1; pointer-events: auto; background: rgba(0,0,0,0.65);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
.sheet {
  background: var(--navy-2); border-radius: 26px 26px 0 0;
  width: 100%; max-height: 88vh; display: flex; flex-direction: column;
  padding-bottom: var(--safe-bottom);
  transform: translateY(100%) translateZ(0);
  transition: transform 0.38s cubic-bezier(0.25,0.46,0.45,0.94);
  will-change: transform;
  border-top: 1px solid var(--divider);
}
.sheet-overlay.open .sheet { transform: translateY(0) translateZ(0); }
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--text-3); margin: 12px auto 0; }
.sheet-hdr { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--divider); flex-shrink: 0; }
.sheet-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--text-1); }
.sheet-close { background: var(--surface); border: none; color: var(--text-2); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transform: translateZ(0); transition: transform 0.12s; }
.sheet-close:active { transform: scale(0.88) translateZ(0); }
.sheet-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
textarea.note-editor { width: 100%; min-height: 180px; background: var(--surface); border: 1px solid var(--divider); border-radius: var(--radius-sm); color: var(--text-1); font-family: inherit; font-size: 15px; line-height: 1.6; padding: 14px; outline: none; resize: none; transition: border-color 0.18s; }
textarea.note-editor:focus { border-color: rgba(11,196,180,0.5); }
textarea.note-editor::placeholder { color: var(--text-3); }
.sheet-actions { display: flex; gap: 10px; padding: 12px 20px; flex-shrink: 0; border-top: 1px solid var(--divider); }
.btn-cancel { flex: 1; padding: 13px; border: none; border-radius: var(--radius-sm); background: var(--surface); color: var(--text-2); font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transform: translateZ(0); transition: transform 0.1s; }
.btn-cancel:active { transform: scale(0.96) translateZ(0); }
.btn-save { flex: 2; padding: 13px; border: none; border-radius: var(--radius-sm); background: var(--teal); color: var(--navy); font-family: inherit; font-size: 15px; font-weight: 800; cursor: pointer; transform: translateZ(0); transition: transform 0.12s; }
.btn-save:active { transform: scale(0.96) translateZ(0); }

/* ── DETAIL PANE TABS ── */
.detail-tabs { display: flex; background: var(--surface); border-radius: 14px; padding: 4px; margin-bottom: 16px; gap: 4px; contain: layout style; }
.detail-tab-btn { flex: 1; padding: 9px 6px; border: none; border-radius: 11px; background: none; color: var(--text-2); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.18s, color 0.18s; display: flex; align-items: center; justify-content: center; gap: 6px; transform: translateZ(0); }
.detail-tab-btn.active { background: var(--surface-2); color: var(--text-1); }
.badge-pill { background: var(--teal); color: var(--navy); font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 20px; }

/* ── EMPTY / LOADING ── */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 28px; gap: 14px; text-align: center; }
.empty-icon { font-size: 52px; opacity: 0.35; }
.empty-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--text-1); }
.empty-body  { font-size: 14px; color: var(--text-2); line-height: 1.5; }
.shimmer { position: relative; overflow: hidden; background: var(--surface); border-radius: var(--radius-sm); }
.shimmer::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent); transform: translateX(-100%) translateZ(0); animation: shimmer-slide 1.4s linear infinite; will-change: transform; }
@keyframes shimmer-slide { to { transform: translateX(300%) translateZ(0); } }
.loading-stack { display: flex; flex-direction: column; gap: 10px; padding-top: 6px; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 100px; left: 50%;
  background: var(--surface-2); color: var(--text-1);
  padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600;
  opacity: 0; pointer-events: none; z-index: 500; white-space: nowrap;
  border: 1px solid var(--divider);
  transform: translateX(-50%) translateY(12px) translateZ(0);
  transition: opacity 0.22s ease, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
  will-change: transform, opacity;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0) translateZ(0); }

/* ── MISC ── */
.divider-line { height: 1px; background: var(--divider); margin: 12px 0; }
.row { display: flex; align-items: center; gap: 8px; }
.row-between { display: flex; align-items: center; justify-content: space-between; }
.spinner { width: 20px; height: 20px; border: 2px solid rgba(11,196,180,0.25); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; will-change: transform; transform: translateZ(0); }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── STAGGERED ENTRANCE ── */
.fade-in { opacity: 0; transform: translateY(10px) translateZ(0); animation: fadeIn 0.32s cubic-bezier(0.25,0.46,0.45,0.94) forwards; will-change: transform, opacity; }
@keyframes fadeIn { to { opacity: 1; transform: translateY(0) translateZ(0); } }
.fade-in:nth-child(1) { animation-delay: 0.04s; }
.fade-in:nth-child(2) { animation-delay: 0.08s; }
.fade-in:nth-child(3) { animation-delay: 0.12s; }
.fade-in:nth-child(4) { animation-delay: 0.16s; }
.fade-in:nth-child(5) { animation-delay: 0.20s; }
.fade-in:nth-child(6) { animation-delay: 0.24s; }
.fade-in:nth-child(7) { animation-delay: 0.28s; }

/* ── LEETIFY ATTRIBUTION (required by developer guidelines) ── */
.leetify-attr {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 14px; background: var(--surface);
  border-radius: 12px; margin-bottom: 16px;
  border: 1px solid var(--divider);
  text-decoration: none;
}
.leetify-attr-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pink); flex-shrink: 0; }
.leetify-attr-text { font-size: 11px; font-weight: 600; color: var(--text-2); }
.leetify-attr-link { font-size: 11px; font-weight: 700; color: var(--pink); text-decoration: underline; margin-left: auto; }

/* ── API GUIDE ── */
.guide-step { display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start; }
.guide-num { background: var(--teal); color: var(--navy); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; flex-shrink: 0; margin-top: 1px; }
.guide-text { font-size: 13px; color: var(--text-2); line-height: 1.55; }
.guide-text strong { color: var(--text-1); display: block; margin-bottom: 2px; }

/* ── PROFILE CARD ── */
.profile-card { display: flex; align-items: center; gap: 14px; background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; contain: content; border: 1px solid var(--divider); }
</style>
</head>
<body>
<div id="app">
  <!-- NAV BAR -->
  <div id="navbar">
    <div class="nav-inner">
      <span class="nav-title" id="nav-title">CS TRACKER</span>
      <button class="nav-btn" id="nav-refresh-btn" onclick="handleNavAction()" title="Refresh">↻</button>
    </div>
  </div>

  <!-- SCREENS -->
  <div id="screen-container">
    <div class="screen active" id="screen-home">
      <div class="screen-inner" id="home-content">
        <div class="empty-state">
          <div class="empty-icon">🎮</div>
          <div class="empty-title">Welcome to CS Tracker</div>
          <div class="empty-body">Go to Settings, enter your Steam64 ID and Leetify API key to get started.</div>
        </div>
      </div>
    </div>

    <div class="screen" id="screen-matches">
      <div class="screen-inner" id="matches-content">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-title">No matches loaded</div>
          <div class="empty-body">Load a player from Settings first.</div>
        </div>
      </div>
    </div>

    <div class="screen" id="screen-detail">
      <div class="screen-inner" id="detail-content"></div>
    </div>

    <div class="screen" id="screen-notes">
      <div class="screen-inner" id="notes-content"></div>
    </div>

    <div class="screen" id="screen-settings">
      <div class="screen-inner" id="settings-content"></div>
    </div>
  </div><!-- /#screen-container -->

  <!-- TAB BAR -->
  <div id="tabbar">
    <div class="tabs">
      <button class="tab active" data-tab="home" onclick="switchTab('home')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>Home</span>
      </button>
      <button class="tab" data-tab="matches" onclick="switchTab('matches')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        <span>Matches</span>
      </button>
      <button class="tab" data-tab="notes" onclick="switchTab('notes')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        <span>Notes</span>
      </button>
      <button class="tab" data-tab="settings" onclick="switchTab('settings')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        <span>Settings</span>
      </button>
    </div>
  </div>
</div>

<!-- NOTE SHEET -->
<div class="sheet-overlay" id="note-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <span class="sheet-title" id="sheet-title">New Note</span>
      <button class="sheet-close" onclick="closeNoteSheet()">✕</button>
    </div>
    <div class="sheet-body">
      <textarea class="note-editor" id="note-editor" placeholder="Write your notes here…&#10;&#10;Capture strategies, mistakes, or anything worth remembering."></textarea>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeNoteSheet()">Cancel</button>
      <button class="btn-save" onclick="saveNote()">Save Note</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const state = {
  apiKey: '', steamId: '', player: null,
  matches: [], notes: [], detailCache: {},
  currentTab: 'home', prevTab: null, currentMatchId: null,
  editingNoteId: null, editingNoteMatchId: null,
  loading: false,
};

// ═══════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════
function persist() {
  localStorage.setItem('cst_apikey',  state.apiKey);
  localStorage.setItem('cst_steamid', state.steamId);
  try { localStorage.setItem('cst_notes', JSON.stringify(state.notes)); } catch {}
}
function loadPersisted() {
  state.apiKey  = localStorage.getItem('cst_apikey')  || '';
  state.steamId = localStorage.getItem('cst_steamid') || '';
  try { state.notes = JSON.parse(localStorage.getItem('cst_notes') || '[]'); } catch { state.notes = []; }
}

// ═══════════════════════════════════════════
// UUID POLYFILL
// ═══════════════════════════════════════════
function uuid() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// ═══════════════════════════════════════════
// LEETIFY API
// Base: https://api-public.cs-prod.leetify.com
// Auth: _leetify_key header
// ═══════════════════════════════════════════
const LEET_BASE = 'https://api-public.cs-prod.leetify.com';

async function leetifyFetch(path) {
  if (!state.apiKey) throw new Error('No API key. Add it in Settings.');
  let r;
  try {
    r = await fetch(LEET_BASE + path, {
      headers: { '_leetify_key': state.apiKey, 'Accept': 'application/json' }
    });
  } catch (e) {
    throw new Error('Network error — check your connection.');
  }
  if (r.status === 401 || r.status === 403) throw new Error('Invalid API key. Check Settings.');
  if (r.status === 404) throw new Error('Player not found. Check your Steam64 ID.');
  if (r.status === 429) throw new Error('Rate limited — wait a moment and try again.');
  if (!r.ok) throw new Error(`API error ${r.status}`);
  return r.json();
}

// Profile endpoint: GET /api/profile/{steam64Id}
async function fetchProfile() {
  return leetifyFetch(`/api/profile/${encodeURIComponent(state.steamId)}`);
}

// Matches endpoint: GET /api/profile/{steam64Id}/matches
async function fetchMatches() {
  return leetifyFetch(`/api/profile/${encodeURIComponent(state.steamId)}/matches`);
}

// Single match: GET /api/matches/{leetifyMatchId}
async function fetchMatchDetail(matchId) {
  return leetifyFetch(`/api/matches/${matchId}`);
}

// ═══════════════════════════════════════════
// LOAD ALL
// ═══════════════════════════════════════════
async function loadAll() {
  if (!state.apiKey) { toast('Add your Leetify API key in Settings.'); return; }
  if (!state.steamId) { toast('Enter your Steam64 ID in Settings.'); return; }
  if (state.loading) return;

  state.loading = true;
  renderHome();

  try {
    const [profile, matches] = await Promise.allSettled([fetchProfile(), fetchMatches()]);
    if (profile.status === 'fulfilled')  state.player  = profile.value;
    if (matches.status === 'fulfilled') {
      // API returns array directly or {matches:[...]}
      const raw = matches.value;
      state.matches = Array.isArray(raw) ? raw : (raw.matches || raw.games || []);
    }
    if (profile.status === 'rejected') throw profile.reason;
    persist();
    toast('Stats loaded ✓');
  } catch (e) {
    toast(e.message || 'Failed to load player.');
  } finally {
    state.loading = false;
    renderHome();
    if (state.matches.length) renderMatches();
  }
}

// ═══════════════════════════════════════════
// NAVIGATION — GPU translateX
// ═══════════════════════════════════════════
const TAB_ORDER = ['home','matches','notes','settings'];

function showScreen(id, direction) {
  document.querySelectorAll('.screen').forEach(s => {
    if (s.id === 'screen-' + id) {
      s.classList.remove('exit-left');
      s.getBoundingClientRect();
      s.classList.add('active');
    } else if (s.classList.contains('active')) {
      s.classList.remove('active');
      if (direction === 'fwd') {
        s.classList.add('exit-left');
        s.addEventListener('transitionend', () => s.classList.remove('exit-left'), { once: true });
      }
    } else {
      s.classList.remove('exit-left');
    }
  });
}

function switchTab(tab) {
  if (tab === 'back') {
    const dest = state.prevTab || 'matches';
    state.currentTab = dest; state.prevTab = null;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === dest));
    showScreen(dest, 'none');
    updateNavBar(dest);
    document.getElementById('tabbar').classList.remove('hidden');
    return;
  }
  const from = TAB_ORDER.indexOf(state.currentTab);
  const to   = TAB_ORDER.indexOf(tab);
  const dir  = to > from ? 'fwd' : 'none';
  state.currentTab = tab; state.prevTab = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  showScreen(tab, dir);
  updateNavBar(tab);
  document.getElementById('tabbar').classList.remove('hidden');
  if (tab === 'notes')    renderNotes();
  if (tab === 'settings') renderSettings();
}

function updateNavBar(tab) {
  const titles = { home:'CS TRACKER', matches:'MATCHES', notes:'NOTES', settings:'SETTINGS', detail:'MATCH' };
  const el = document.getElementById('nav-title');
  el.classList.add('changing');
  setTimeout(() => { el.textContent = titles[tab] || 'CS TRACKER'; el.classList.remove('changing'); }, 80);
  const btn = document.getElementById('nav-refresh-btn');
  btn.textContent = tab === 'detail' ? '←' : tab === 'notes' ? '+' : '↻';
  btn.title       = tab === 'detail' ? 'Back' : tab === 'notes' ? 'New note' : 'Refresh';
  btn.onclick = handleNavAction;
}

let _busy = false;
function handleNavAction() {
  if (state.currentTab === 'detail') { switchTab('back'); return; }
  if (state.currentTab === 'notes')  { openNoteSheet('', null); return; }
  if (_busy) return; _busy = true;
  refreshCurrent().finally(() => { _busy = false; });
}

function openDetail(matchId) {
  state.prevTab = state.currentTab; state.currentMatchId = matchId;
  state.currentTab = 'detail';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tabbar').classList.add('hidden');
  showScreen('detail', 'fwd');
  updateNavBar('detail');
  renderDetail(matchId);
}

async function refreshCurrent() {
  const t = state.currentTab;
  if (!state.player && t !== 'settings') { switchTab('settings'); return; }
  if (t === 'home' || t === 'matches') await loadAll();
  if (t === 'notes') renderNotes();
  if (t === 'settings') renderSettings();
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pct(v, d=1) { return v != null ? (parseFloat(v)*100).toFixed(d)+'%' : '—'; }
function fix(v, d=2) { return v != null ? parseFloat(v).toFixed(d) : '—'; }
function fmt(v)      { return v != null ? String(v) : '—'; }

function relTime(iso) {
  if (!iso) return '—';
  const d = typeof iso === 'number' ? iso * 1000 : Date.parse(iso);
  const mins = Math.floor((Date.now() - d) / 60000);
  if (mins < 1)  return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins/60);
  if (hrs < 24)  return `${hrs}h ago`;
  const days = Math.floor(hrs/24);
  if (days < 7)  return `${days}d ago`;
  return new Date(d).toLocaleDateString('en',{month:'short',day:'numeric'});
}

function shimmerStack(rows=5) {
  return `<div class="loading-stack">${Array.from({length:rows},(_,i)=>`<div class="shimmer fade-in" style="height:${i===0?'170px':'72px'};animation-delay:${i*0.06}s"></div>`).join('')}</div>`;
}

function ratingColor(r) {
  if (r == null) return '';
  const v = parseFloat(r);
  if (v >= 55) return 'val-win';
  if (v >= 40) return '';
  return 'val-loss';
}

function formDots(results=[]) {
  return `<div class="form-row">${results.slice(0,10).map(r=>`<div class="form-dot ${r===1||r==='1'||r===true?'w':'l'}"></div>`).join('')}</div>`;
}

// ═══════════════════════════════════════════
// HOME SCREEN
// ═══════════════════════════════════════════
function renderHome() {
  const el = document.getElementById('home-content');
  if (state.loading) { el.innerHTML = `<div style="padding-top:18px">${shimmerStack(5)}</div>`; return; }
  if (!state.player) {
    el.innerHTML = `
      <div class="empty-state" style="padding-top:60px">
        <div class="empty-icon">🎮</div>
        <div class="empty-title">Welcome to CS Tracker</div>
        <div class="empty-body">Go to Settings, enter your Steam64 ID and Leetify API key to load your stats.</div>
        <button class="btn-pill teal" style="margin-top:8px" onclick="switchTab('settings')">Open Settings →</button>
      </div>`;
    return;
  }

  const p = state.player;
  // Leetify API fields (may vary by version)
  const name       = p.name || p.nickname || p.steamNickname || 'Player';
  const avatar     = p.avatarUrl || p.avatar || null;
  const leetRating = p.leetifyRating ?? p.rating ?? null;
  const aimRating  = p.aimRating ?? p.aim ?? null;
  const utilRating = p.utilityRating ?? p.utility ?? null;
  const posRating  = p.positioningRating ?? p.positioning ?? null;
  const kd         = p.kdRatio ?? p.kd ?? null;
  const hs         = p.headshotPercentage ?? p.headshots ?? null;
  const winRate    = p.winRate ?? p.winrate ?? null;
  const matchCount = p.matchCount ?? p.matches ?? (state.matches.length || null);
  const csRating   = p.csRating ?? p.premierRating ?? null;
  const ttd        = p.timeToDamage ?? p.averageTimeToDamage ?? null;
  const recentRes  = p.recentResults || p.recent_results || [];

  el.innerHTML = `
    <div style="padding-top:18px">
      <!-- Attribution (required by Leetify guidelines) -->
      <a href="https://leetify.com" target="_blank" class="leetify-attr fade-in">
        <div class="leetify-attr-dot"></div>
        <span class="leetify-attr-text">Data Provided by Leetify</span>
        <span class="leetify-attr-link">View on Leetify →</span>
      </a>

      <!-- Profile row -->
      <div class="row-between fade-in" style="margin-bottom:18px">
        <div>
          <div style="font-size:12px;color:var(--text-2);margin-bottom:3px">Your Profile</div>
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:26px;line-height:1.1;color:var(--text-1)">${esc(name)}</div>
          ${csRating ? `<div style="font-size:12px;color:var(--teal);margin-top:4px;font-weight:600">⭐ ${fmt(csRating)} CS Rating</div>` : ''}
        </div>
        <div class="avatar" style="width:58px;height:58px">
          ${avatar ? `<img src="${esc(avatar)}" alt="" onerror="this.outerHTML='<span style=\\'font-size:24px\\'>👤</span>'">` : '<span style="font-size:24px">👤</span>'}
        </div>
      </div>

      <!-- Leetify Rating Hero Card -->
      <div class="hero-card fade-in" style="margin-bottom:18px">
        <div style="font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--teal);text-transform:uppercase;margin-bottom:10px">Leetify Rating</div>
        <div style="display:flex;align-items:flex-end;gap:8px;margin-bottom:12px">
          <div class="rating-num ${ratingColor(leetRating)}">${leetRating != null ? parseFloat(leetRating).toFixed(1) : '—'}</div>
        </div>
        ${recentRes.length ? formDots(recentRes) : ''}
        ${winRate != null ? `<div style="margin-top:10px;font-size:12px;color:var(--text-2)">Win rate: <span style="color:var(--text-1);font-weight:700">${pct(winRate)}</span></div>` : ''}
      </div>

      <!-- Core Stats 2x2 Grid -->
      <div class="section-hdr fade-in"><span class="section-title">Performance</span></div>
      <div class="stat-grid fade-in">
        <div class="stat-cell">
          <div class="stat-cell-icon">🎯</div>
          <div class="stat-cell-val ${ratingColor(aimRating)}">${aimRating != null ? parseFloat(aimRating).toFixed(1) : '—'}</div>
          <div class="stat-cell-lbl">Aim Rating</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-icon">💡</div>
          <div class="stat-cell-val ${ratingColor(utilRating)}">${utilRating != null ? parseFloat(utilRating).toFixed(1) : '—'}</div>
          <div class="stat-cell-lbl">Utility Rating</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-icon">📐</div>
          <div class="stat-cell-val ${ratingColor(posRating)}">${posRating != null ? parseFloat(posRating).toFixed(1) : '—'}</div>
          <div class="stat-cell-lbl">Positioning</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-icon">⏱</div>
          <div class="stat-cell-val">${ttd != null ? parseFloat(ttd).toFixed(0)+'ms' : '—'}</div>
          <div class="stat-cell-lbl">Time to Damage</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-icon">⚔️</div>
          <div class="stat-cell-val ${kd!=null&&parseFloat(kd)>=1?'val-win':kd!=null?'val-loss':''}">${kd != null ? parseFloat(kd).toFixed(2) : '—'}</div>
          <div class="stat-cell-lbl">K/D Ratio</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-icon">💥</div>
          <div class="stat-cell-val val-teal">${hs != null ? (parseFloat(hs)<=1?pct(hs):parseFloat(hs).toFixed(1)+'%') : '—'}</div>
          <div class="stat-cell-lbl">Headshot %</div>
        </div>
      </div>

      ${matchCount != null ? `
      <div class="card-p fade-in" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <span style="font-size:14px;color:var(--text-2)">Total matches tracked</span>
        <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--text-1)">${fmt(matchCount)}</span>
      </div>` : ''}

      <!-- Recent Matches Preview -->
      ${state.matches.length ? `
      <div class="section-hdr fade-in">
        <span class="section-title">Recent Matches</span>
        <button class="section-link" onclick="switchTab('matches')">See all ›</button>
      </div>
      ${state.matches.slice(0,3).map((m,i) => matchCard(m, i)).join('')}
      ` : ''}
    </div>`;
}

// ═══════════════════════════════════════════
// MATCHES SCREEN
// ═══════════════════════════════════════════
function matchCard(m, i=0) {
  // Leetify match fields
  const map    = m.mapName || m.map_name || m.map || 'Unknown Map';
  const won    = m.won ?? m.win ?? m.result ?? null;
  const isWin  = won === true || won === 1 || won === '1';
  const score  = m.score || (m.teamScore != null ? `${m.teamScore} - ${m.enemyScore}` : null) || '—';
  const date   = relTime(m.gameFinishedAt || m.finishedAt || m.date || m.createdAt);
  const source = m.dataSource || m.source || 'Matchmaking';
  const lr     = m.leetifyRating ?? m.playerStats?.leetifyRating ?? null;

  return `<div class="match-card fade-in" style="animation-delay:${i*0.05}s" onclick="openDetail('${esc(m.id||m.matchId||m.gameId||'')}')">
    <div class="match-card-accent ${isWin?'':'loss'}"></div>
    <div class="match-card-body">
      <div class="match-card-icon ${isWin?'':'loss'}">${isWin?'🏆':'💀'}</div>
      <div class="match-card-info">
        <div class="match-map">${esc(map)}</div>
        <div class="match-sub">${date} · ${esc(source)}</div>
      </div>
      <div class="match-card-right">
        <div class="match-score ${isWin?'':'loss'}">${esc(score)}</div>
        <span class="result-badge ${isWin?'win':'loss'}">${isWin?'WIN':'LOSS'}</span>
        ${lr != null ? `<span style="font-size:10px;color:var(--text-3)">LR ${parseFloat(lr).toFixed(1)}</span>` : ''}
      </div>
    </div>
  </div>`;
}

function renderMatches() {
  const el = document.getElementById('matches-content');
  if (!state.matches.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No matches</div><div class="empty-body">Load a player from Settings first.</div></div>`;
    return;
  }
  const wins   = state.matches.filter(m => m.won===true||m.won===1||m.won==='1').length;
  const losses = state.matches.length - wins;
  el.innerHTML = `
    <div style="padding-top:16px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
        ${[['PLAYED', state.matches.length, ''], ['WINS', wins, 'var(--win)'], ['LOSSES', losses, 'var(--loss)']].map(([l,v,c])=>`
          <div style="display:inline-flex;align-items:center;gap:6px;background:var(--surface);padding:7px 13px;border-radius:20px;border:1px solid var(--divider)">
            <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:${c||'var(--text-1)'}">${v}</span>
            <span style="font-size:9px;font-weight:700;letter-spacing:0.8px;color:var(--text-3);text-transform:uppercase">${l}</span>
          </div>`).join('')}
      </div>
      ${state.matches.map((m,i) => matchCard(m,i)).join('')}
    </div>`;
}

// ═══════════════════════════════════════════
// MATCH DETAIL
// ═══════════════════════════════════════════
async function renderDetail(matchId) {
  const el = document.getElementById('detail-content');
  if (!matchId) { el.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-title">No match ID</div></div>`; return; }

  el.innerHTML = `<div style="padding-top:14px">${shimmerStack(4)}</div>`;

  let data = state.detailCache[matchId];
  if (!data) {
    try {
      data = await fetchMatchDetail(matchId);
      state.detailCache[matchId] = data;
    } catch (e) {
      // Fall back to list data
      data = state.matches.find(m => (m.id||m.matchId||m.gameId) === matchId) || null;
    }
  }

  if (!data) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Match data unavailable</div></div>`;
    return;
  }

  const map    = data.mapName || data.map_name || data.map || 'Unknown Map';
  const won    = data.won ?? data.win ?? null;
  const isWin  = won === true || won === 1;
  const score  = data.score || (data.teamScore!=null ? `${data.teamScore} - ${data.enemyScore}` : '—');
  const date   = data.gameFinishedAt || data.finishedAt || data.date || null;
  const dateStr = date ? new Date(typeof date==='number'?date*1000:date).toLocaleString('en',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
  const source  = data.dataSource || data.source || 'Matchmaking';
  const notes   = state.notes.filter(n => n.matchId === matchId);

  // Player list from Leetify detail (varies by API version)
  const players = data.players || data.playerStats || data.playerRoundStats || [];
  const myId    = state.steamId;

  document.getElementById('nav-title').textContent = map.toUpperCase().slice(0,12);

  el.innerHTML = `
    <div style="padding-top:14px">
      <!-- Hero -->
      <div class="hero-card fade-in" style="margin-bottom:16px">
        <div class="row-between" style="margin-bottom:12px">
          <div>
            <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--text-1)">${esc(map)}</div>
            <div style="font-size:12px;color:var(--text-2);margin-top:3px">${dateStr}</div>
          </div>
          <div style="text-align:right">
            <div class="match-score ${isWin?'':'loss'}" style="font-size:34px">${esc(score)}</div>
            <span class="result-badge ${isWin?'win':'loss'}" style="font-size:11px">${isWin?'WIN':'LOSS'}</span>
          </div>
        </div>
        <div class="divider-line"></div>
        <div style="display:flex;gap:14px;margin-top:10px;flex-wrap:wrap">
          <span style="font-size:11px;color:var(--text-2)">🏆 ${esc(source)}</span>
          ${data.rounds ? `<span style="font-size:11px;color:var(--text-2)">🔄 ${data.rounds} rounds</span>` : ''}
        </div>
      </div>

      <!-- Leetify Rating for this match -->
      ${data.leetifyRating != null ? `
      <div class="card-p fade-in" style="margin-bottom:16px;display:flex;gap:20px">
        <div><div style="font-size:22px;font-family:'Syne',sans-serif;font-weight:800;color:var(--teal)">${parseFloat(data.leetifyRating).toFixed(1)}</div><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.8px;margin-top:3px">Leetify Rating</div></div>
        ${data.aimRating!=null?`<div><div style="font-size:22px;font-family:'Syne',sans-serif;font-weight:800;color:var(--text-1)">${parseFloat(data.aimRating).toFixed(1)}</div><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.8px;margin-top:3px">Aim</div></div>`:''}
        ${data.utilityRating!=null?`<div><div style="font-size:22px;font-family:'Syne',sans-serif;font-weight:800;color:var(--text-1)">${parseFloat(data.utilityRating).toFixed(1)}</div><div style="font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.8px;margin-top:3px">Utility</div></div>`:''}
      </div>` : ''}

      <!-- Tab Selector -->
      <div class="detail-tabs fade-in" id="detail-tabs">
        <button class="detail-tab-btn active" onclick="switchDetailTab('scoreboard')">Scoreboard</button>
        <button class="detail-tab-btn" onclick="switchDetailTab('notes')">
          Notes ${notes.length ? `<span class="badge-pill">${notes.length}</span>` : ''}
        </button>
      </div>

      <!-- Scoreboard Pane -->
      <div id="detail-scoreboard" style="transition:opacity 0.2s ease">
        ${players.length ? renderScoreboard(players, myId) : `
          <div class="card-p" style="text-align:center;color:var(--text-2);font-size:14px;padding:30px">
            Detailed scoreboard not available for this match.<br>
            <a href="https://leetify.com/app/match-details/${esc(matchId)}" target="_blank" style="color:var(--pink);font-weight:700;text-decoration:underline;display:inline-block;margin-top:10px">View on Leetify →</a>
          </div>`}
      </div>

      <!-- Notes Pane -->
      <div id="detail-notes" style="opacity:0;pointer-events:none;position:absolute;top:0;left:0;right:0;transition:opacity 0.2s ease">
        ${renderDetailNotes(matchId)}
      </div>
    </div>`;
}

function renderScoreboard(players, myId) {
  // Leetify player stats fields
  return `<div class="sb-card fade-in">
    <div class="sb-team-hdr"><span class="sb-team-name">Players</span></div>
    <div class="sb-cols">
      <span class="sb-col-hdr">Player</span>
      <span class="sb-col-hdr">K</span>
      <span class="sb-col-hdr">A</span>
      <span class="sb-col-hdr">D</span>
      <span class="sb-col-hdr">K/D</span>
      <span class="sb-col-hdr">HS%</span>
    </div>
    ${players.map(pl => {
      const isMe = pl.steam64Id === myId || pl.steamId === myId;
      const name = pl.name || pl.nickname || pl.steam64Id || '?';
      const k    = pl.kills ?? pl.k ?? '—';
      const a    = pl.assists ?? pl.a ?? '—';
      const d    = pl.deaths ?? pl.d ?? '—';
      const kd   = pl.kdRatio ?? pl.kd ?? (k!=='—'&&d!=='—'&&d!==0 ? (k/d).toFixed(2) : '—');
      const hs   = pl.headshotPercentage ?? pl.hs ?? null;
      const hsStr = hs != null ? (parseFloat(hs)<=1 ? pct(hs,0) : Math.round(parseFloat(hs))+'%') : '—';
      return `<div class="sb-player ${isMe?'me':''}">
        <div class="sb-player-name">${esc(name)}</div>
        <div class="sb-stat">${fmt(k)}</div>
        <div class="sb-stat">${fmt(a)}</div>
        <div class="sb-stat">${fmt(d)}</div>
        <div class="sb-stat">${fmt(kd)}</div>
        <div class="sb-stat">${hsStr}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function switchDetailTab(tab) {
  document.querySelectorAll('#detail-tabs .detail-tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&tab==='scoreboard')||(i===1&&tab==='notes'));
  });
  const sb = document.getElementById('detail-scoreboard');
  const nt = document.getElementById('detail-notes');
  if (tab === 'scoreboard') {
    sb.style.opacity='1'; sb.style.pointerEvents='auto';
    nt.style.opacity='0'; nt.style.pointerEvents='none';
  } else {
    nt.style.opacity='1'; nt.style.pointerEvents='auto';
    sb.style.opacity='0'; sb.style.pointerEvents='none';
  }
}

function renderDetailNotes(matchId) {
  const notes = state.notes.filter(n => n.matchId === matchId);
  if (!notes.length) return `
    <div class="card-p" style="text-align:center;padding:36px 20px">
      <div style="font-size:34px;margin-bottom:12px;opacity:0.35">📝</div>
      <div style="color:var(--text-2);font-size:14px;margin-bottom:16px">No notes for this match yet.</div>
      <button class="btn-pill teal" onclick="openNoteSheet('${matchId}', null)">Add Note</button>
    </div>`;
  return notes.map(n => noteCardHTML(n)).join('') +
    `<div style="text-align:center;margin-top:8px"><button class="section-link" onclick="openNoteSheet('${matchId}',null)">+ Add another note</button></div>`;
}

// ═══════════════════════════════════════════
// NOTES SCREEN
// ═══════════════════════════════════════════
function noteCardHTML(n) {
  const isMatch = n.matchId && n.matchId !== '';
  const d = new Date(n.updatedAt).toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'});
  return `<div class="note-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span class="note-tag">${isMatch?'🔫 Match':'📝 General'}</span>
      <span class="note-date">${d}</span>
    </div>
    <div class="note-body">${esc(n.content)}</div>
    <div class="note-actions">
      <button class="btn-sm btn-edit" onclick="openNoteSheet('${n.matchId||''}','${n.id}')">Edit</button>
      <button class="btn-sm btn-del" onclick="deleteNote('${n.id}')">🗑</button>
    </div>
  </div>`;
}

function renderNotes() {
  const el = document.getElementById('notes-content');
  if (!state.notes.length) {
    el.innerHTML = `<div class="empty-state" style="padding-top:60px">
      <div class="empty-icon">📝</div>
      <div class="empty-title">No notes yet</div>
      <div class="empty-body">Tap + to write a note, or add notes from inside any match.</div>
      <button class="btn-pill teal" style="margin-top:8px" onclick="openNoteSheet('',null)">Create First Note</button>
    </div>`;
    return;
  }
  el.innerHTML = `<div style="padding-top:16px">${state.notes.map(n=>noteCardHTML(n)).join('')}</div>`;
}

function refreshNotesUI() {
  if (state.currentTab === 'notes') { renderNotes(); return; }
  if (state.currentTab === 'detail') {
    const pane = document.getElementById('detail-notes');
    if (pane) pane.innerHTML = renderDetailNotes(state.currentMatchId);
    const notes = state.notes.filter(n => n.matchId === state.currentMatchId);
    const btns  = document.querySelectorAll('#detail-tabs .detail-tab-btn');
    if (btns[1]) btns[1].innerHTML = `Notes ${notes.length?`<span class="badge-pill">${notes.length}</span>`:''}`;
  }
}

// ═══════════════════════════════════════════
// NOTE SHEET
// ═══════════════════════════════════════════
function openNoteSheet(matchId, noteId) {
  state.editingNoteId      = noteId;
  state.editingNoteMatchId = matchId || '';
  const existing = noteId ? state.notes.find(n => n.id === noteId) : null;
  document.getElementById('sheet-title').textContent = noteId ? 'Edit Note' : 'New Note';
  document.getElementById('note-editor').value = existing ? existing.content : '';
  document.getElementById('note-sheet').classList.add('open');
  setTimeout(() => document.getElementById('note-editor').focus(), 350);
}
function closeNoteSheet() { document.getElementById('note-sheet').classList.remove('open'); }

function saveNote() {
  const content = document.getElementById('note-editor').value.trim();
  if (!content) { toast('Write something first.'); return; }
  if (state.editingNoteId) {
    const idx = state.notes.findIndex(n => n.id === state.editingNoteId);
    if (idx >= 0) { state.notes[idx].content = content; state.notes[idx].updatedAt = new Date().toISOString(); }
  } else {
    state.notes.unshift({ id: uuid(), matchId: state.editingNoteMatchId, content, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
  }
  persist();
  closeNoteSheet();
  toast('Note saved ✓');
  refreshNotesUI();
}

function deleteNote(id) {
  state.notes = state.notes.filter(n => n.id !== id);
  persist();
  toast('Note deleted');
  refreshNotesUI();
}

function toggleGuide() {
  const g = document.getElementById('api-guide');
  const c = document.getElementById('guide-chev');
  const open = g.style.display === 'none';
  g.style.display = open ? '' : 'none';
  c.textContent = open ? '∨' : '›';
}

async function handleLoad() {
  const steamId = document.getElementById('inp-steam')?.value?.trim();
  const apiKey  = document.getElementById('inp-key')?.value?.trim();
  if (!apiKey)   { toast('Enter your Leetify API key.'); return; }
  if (!steamId)  { toast('Enter your Steam64 ID.'); return; }
  if (!/^\d{15,}$/.test(steamId)) { toast('Steam64 ID should be a 17-digit number.'); return; }

  state.apiKey  = apiKey;
  state.steamId = steamId;
  persist();

  const btn = document.getElementById('load-btn');
  const cnt = document.getElementById('load-content');
  if (btn) btn.disabled = true;
  if (cnt) cnt.innerHTML = '<span class="spinner"></span> Loading…';

  await loadAll();

  if (btn) btn.disabled = false;
  if (cnt) cnt.textContent = 'Load Player';
  if (state.player) switchTab('home');
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════
document.getElementById('note-sheet').addEventListener('click', e => {
  if (e.target === document.getElementById('note-sheet')) closeNoteSheet();
});

// BOOT
// ═══════════════════════════════════════════
loadPersisted();

requestAnimationFrame(() => {
  document.querySelectorAll('.screen:not(#screen-home)').forEach(s => s.classList.remove('active'));
  renderSettings();
  renderNotes();

  if (state.apiKey && state.steamId) {
    loadAll();
  } else {
    renderHome();
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
});
